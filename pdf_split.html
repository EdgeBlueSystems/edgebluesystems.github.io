<div class="hero">
  <h1>✂️ PDF 分割</h1>
  <p>按頁碼範圍分割 PDF · 或每頁各存一檔 · 檔案不上傳伺服器</p>
</div>

<div class="container">
  <div class="card">
    <h2>上傳 PDF 檔案</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📂</div>
      <p><strong>點擊選擇</strong>或拖曳 PDF 到這裡</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf">
    <div class="file-info" id="fileInfo"></div>
  </div>

  <div class="card" id="splitCard" style="display:none;">
    <h2>選擇分割方式</h2>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="switchMode('range')">📋 自訂頁碼範圍</div>
      <div class="mode-tab" onclick="switchMode('each')">📄 每頁各存一檔</div>
      <div class="mode-tab" onclick="switchMode('every')">✂️ 每 N 頁分一段</div>
    </div>

    <!-- 自訂範圍 -->
    <div class="mode-panel active" id="panel-range">
      <p style="font-size:13px;color:#64748b;margin-bottom:10px;">設定要分割的頁碼範圍，可新增多個範圍各自存檔</p>
      <div class="range-list" id="rangeList">
        <div class="range-item">
          <span>頁</span>
          <input type="number" class="from" min="1" value="1">
          <span>到</span>
          <input type="number" class="to" min="1" value="1">
          <button class="btn-del-range" onclick="delRange(this)">✕</button>
        </div>
      </div>
      <button class="btn-add-range" onclick="addRange()">＋ 新增範圍</button>
    </div>

    <!-- 每頁 -->
    <div class="mode-panel" id="panel-each">
      <p style="font-size:13px;color:#64748b;">將每一頁分別存成獨立的 PDF 檔案</p>
    </div>

    <!-- 每N頁 -->
    <div class="mode-panel" id="panel-every">
      <label>每幾頁分割一段</label>
      <input type="number" id="everyN" value="1" min="1" style="width:120px;">
      <div class="hint">例如填 3，則每 3 頁存成一個 PDF</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-gray" onclick="reset()">重新選擇</button>
      <button class="btn btn-primary" id="splitBtn" onclick="splitPDF()">✂️ 開始分割</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">處理中...</div>
    </div>

    <div class="result-box" id="resultBox">
      <h3>✅ 分割完成！</h3>
      <div class="download-list" id="downloadList"></div>
    </div>
  </div>
</div>

<script>
const { PDFDocument } = PDFLib;
let pdfFile = null;
let totalPages = 0;
let currentMode = 'range';

// 拖曳上傳
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => { loadFile(e.target.files[0]); e.target.value=''; });

async function loadFile(file) {
  if(!file || file.type !== 'application/pdf') return;
  pdfFile = file;
  const buf = await file.arrayBuffer();
  const pdf = await PDFDocument.load(buf);
  totalPages = pdf.getPageCount();
  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('fileInfo').textContent = `✅ ${file.name}  |  共 ${totalPages} 頁  |  ${(file.size/1024).toFixed(0)} KB`;
  document.getElementById('splitCard').style.display = 'block';
  // 更新範圍預設值
  document.querySelectorAll('.to').forEach(i => i.max = i.value = totalPages);
  document.querySelectorAll('.from').forEach(i => i.max = totalPages);
  document.getElementById('everyN').max = totalPages;
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', ['range','each','every'][i]===mode));
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+mode).classList.add('active');
}

function addRange() {
  const list = document.getElementById('rangeList');
  const item = document.createElement('div');
  item.className = 'range-item';
  item.innerHTML = `<span>頁</span><input type="number" class="from" min="1" max="${totalPages}" value="1"><span>到</span><input type="number" class="to" min="1" max="${totalPages}" value="${totalPages}"><button class="btn-del-range" onclick="delRange(this)">✕</button>`;
  list.appendChild(item);
}
function delRange(btn) {
  const items = document.querySelectorAll('.range-item');
  if(items.length > 1) btn.parentElement.remove();
}

function reset() { pdfFile=null; totalPages=0; document.getElementById('splitCard').style.display='none'; document.getElementById('fileInfo').style.display='none'; document.getElementById('resultBox').style.display='none'; }

async function splitPDF() {
  if(!pdfFile) return;
  const btn = document.getElementById('splitBtn');
  const pw  = document.getElementById('progressWrap');
  const pf  = document.getElementById('progressFill');
  const pt  = document.getElementById('progressText');
  const rb  = document.getElementById('resultBox');
  const dl  = document.getElementById('downloadList');

  btn.disabled=true; pw.style.display='block'; rb.style.display='none'; dl.innerHTML='';

  try {
    const buf = await pdfFile.arrayBuffer();
    const srcPdf = await PDFDocument.load(buf);
    const segments = [];

    if(currentMode==='range') {
      document.querySelectorAll('.range-item').forEach((item,i) => {
        const from = parseInt(item.querySelector('.from').value)||1;
        const to   = parseInt(item.querySelector('.to').value)||totalPages;
        segments.push({ label:`第${from}-${to}頁`, pages: Array.from({length:to-from+1},(_,k)=>from+k-1) });
      });
    } else if(currentMode==='each') {
      for(let i=0;i<totalPages;i++) segments.push({ label:`第${i+1}頁`, pages:[i] });
    } else {
      const n = parseInt(document.getElementById('everyN').value)||1;
      for(let i=0;i<totalPages;i+=n) {
        const end = Math.min(i+n-1, totalPages-1);
        segments.push({ label:`第${i+1}-${end+1}頁`, pages: Array.from({length:end-i+1},(_,k)=>i+k) });
      }
    }

    for(let i=0;i<segments.length;i++) {
      const seg = segments[i];
      pf.style.width = ((i/segments.length)*100)+'%';
      pt.textContent = `正在產生：${seg.label} (${i+1}/${segments.length})`;
      const newPdf = await PDFDocument.create();
      const copied = await newPdf.copyPages(srcPdf, seg.pages);
      copied.forEach(p => newPdf.addPage(p));
      const bytes = await newPdf.save();
      const blob  = new Blob([bytes],{type:'application/pdf'});
      const url   = URL.createObjectURL(blob);
      const fname = pdfFile.name.replace('.pdf','') + `_${seg.label}.pdf`;
      dl.innerHTML += `<div class="dl-item"><span>${seg.label}（${seg.pages.length}頁）</span><a href="${url}" download="${fname}" class="btn-dl">⬇️ 下載</a></div>`;
    }

    pf.style.width='100%'; pt.textContent='完成！';
    rb.style.display='block';
  } catch(e) {
    pt.textContent='❌ 失敗：'+e.message; pt.style.color='#ef4444';
  } finally { btn.disabled=false; }
}
</script>
</body>
