<div class="hero">
  <h1>🖼️ JPG 轉 PDF</h1>
  <p>將圖片合併成 PDF · 拖曳調整順序 · 檔案不上傳伺服器</p>
</div>

<div class="container">
  <div class="card">
    <h2>選擇圖片</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🖼️</div>
      <p><strong>點擊選擇</strong>或拖曳圖片到這裡</p>
      <p style="font-size:0.8rem;margin-top:6px;color:#94a3b8;">支援 JPG、PNG、WebP，可同時選多張</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="img-grid" id="imgGrid"></div>
    <div class="tip" id="dragTip" style="display:none;">💡 拖曳圖片可以調整在 PDF 中的順序</div>
  </div>

  <div class="card" id="settingsCard" style="display:none;">
    <h2>PDF 設定</h2>

    <label>頁面大小</label>
    <div class="radio-row">
      <label><input type="radio" name="pageSize" value="fit" checked> 依圖片大小</label>
      <label><input type="radio" name="pageSize" value="a4"> A4</label>
      <label><input type="radio" name="pageSize" value="letter"> Letter</label>
    </div>

    <label>圖片方向（A4/Letter 時）</label>
    <div class="radio-row">
      <label><input type="radio" name="orient" value="auto" checked> 自動判斷</label>
      <label><input type="radio" name="orient" value="portrait"> 直式</label>
      <label><input type="radio" name="orient" value="landscape"> 橫式</label>
    </div>

    <div class="btn-row">
      <button class="btn btn-gray" onclick="clearAll()">🗑️ 清除全部</button>
      <button class="btn btn-primary" id="convertBtn" onclick="convertToPDF()">🖼️ 轉換成 PDF</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">處理中...</div>
    </div>

    <div class="result-box" id="resultBox">
      <h3>✅ 轉換完成！</h3>
      <p id="resultInfo" style="font-size:13px;color:#78350f;margin-bottom:14px;"></p>
      <a id="downloadLink" class="btn-download">⬇️ 下載 PDF</a>
    </div>
  </div>
</div>

<script>
const { PDFDocument, PageSizes } = PDFLib;
let images = []; // {file, url}
let dragSrcIdx = null;

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addImages([...e.dataTransfer.files]); });
document.getElementById('fileInput').addEventListener('change', e => { addImages([...e.target.files]); e.target.value=''; });

function addImages(files) {
  const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
  files.filter(f => allowed.includes(f.type)).forEach(f => {
    const url = URL.createObjectURL(f);
    images.push({file:f, url});
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';
  images.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.draggable = true;
    item.dataset.index = i;
    item.innerHTML = `
      <img src="${img.url}" alt="圖片 ${i+1}">
      <span class="order-badge">${i+1}</span>
      <button class="del-btn" onclick="removeImg(${i})">✕</button>`;

    item.addEventListener('dragstart', () => { dragSrcIdx=i; item.classList.add('dragging'); });
    item.addEventListener('dragend',   () => item.classList.remove('dragging'));
    item.addEventListener('dragover',  e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault(); item.classList.remove('drag-over');
      if(dragSrcIdx!==null && dragSrcIdx!==i) {
        const moved = images.splice(dragSrcIdx,1)[0];
        images.splice(i,0,moved);
        dragSrcIdx=null; renderGrid();
      }
    });
    grid.appendChild(item);
  });
  document.getElementById('settingsCard').style.display = images.length>0?'block':'none';
  document.getElementById('dragTip').style.display = images.length>1?'block':'none';
  document.getElementById('convertBtn').disabled = images.length===0;
}

function removeImg(i) { URL.revokeObjectURL(images[i].url); images.splice(i,1); renderGrid(); }
function clearAll()   { images.forEach(img => URL.revokeObjectURL(img.url)); images=[]; renderGrid(); }

async function convertToPDF() {
  if(images.length===0) return;
  const btn = document.getElementById('convertBtn');
  const pw  = document.getElementById('progressWrap');
  const pf  = document.getElementById('progressFill');
  const pt  = document.getElementById('progressText');
  const rb  = document.getElementById('resultBox');

  btn.disabled=true; pw.style.display='block'; rb.style.display='none';

  try {
    const pdf = await PDFDocument.create();
    const pageSize = document.querySelector('input[name="pageSize"]:checked').value;
    const orient   = document.querySelector('input[name="orient"]:checked').value;

    for(let i=0; i<images.length; i++) {
      pf.style.width = ((i/images.length)*90)+'%';
      pt.textContent = `處理第 ${i+1}/${images.length} 張：${images[i].file.name}`;

      const buf = await images[i].file.arrayBuffer();
      const mimeType = images[i].file.type;
      let pdfImg;
      if(mimeType==='image/png') pdfImg = await pdf.embedPng(buf);
      else pdfImg = await pdf.embedJpg(buf);

      const { width:iw, height:ih } = pdfImg;

      let pw2, ph;
      if(pageSize==='fit') {
        pw2 = iw; ph = ih;
      } else if(pageSize==='a4') {
        [pw2,ph] = PageSizes.A4;
        if(orient==='landscape' || (orient==='auto' && iw>ih)) [pw2,ph]=[ph,pw2];
      } else {
        [pw2,ph] = PageSizes.Letter;
        if(orient==='landscape' || (orient==='auto' && iw>ih)) [pw2,ph]=[ph,pw2];
      }

      const page = pdf.addPage([pw2,ph]);
      // 等比縮放
      const scale = Math.min(pw2/iw, ph/ih);
      const dw=iw*scale, dh=ih*scale;
      page.drawImage(pdfImg, { x:(pw2-dw)/2, y:(ph-dh)/2, width:dw, height:dh });
    }

    pf.style.width='100%'; pt.textContent='產生 PDF...';
    const bytes = await pdf.save();

    const blob = new Blob([bytes],{type:'application/pdf'});
    const url  = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    link.href = url;
    link.download = `images_to_pdf_${images.length}pages.pdf`;
    document.getElementById('resultInfo').textContent =
      `共 ${images.length} 張圖片 → ${images.length} 頁 PDF，檔案大小 ${(bytes.length/1024).toFixed(0)} KB`;
    rb.style.display='block';
  } catch(e) {
    pt.textContent='❌ 失敗：'+e.message; pt.style.color='#ef4444';
  } finally { btn.disabled=false; }
}
</script>
