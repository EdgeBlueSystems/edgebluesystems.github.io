    :root { --eb-blue:#1a3a5f; --eb-accent:#2d6a4f; --eb-gold:#ff9f1c; }

    .hero { background:linear-gradient(135deg,var(--eb-blue),#0f2744); color:white; padding:36px 20px; text-align:center; }
    .hero h1 { font-size:1.6rem; margin-bottom:6px; }
    .hero p { font-size:0.88rem; opacity:0.8; }
    .container { max-width:760px; margin:30px auto; padding:0 15px; }
    .card { background:white; border-radius:14px; padding:28px; box-shadow:0 4px 15px rgba(0,0,0,0.06); margin-bottom:20px; }
    .card h2 { font-size:1rem; color:var(--eb-blue); margin-bottom:16px; border-left:4px solid var(--eb-accent); padding-left:10px; }

    /* 拖曳上傳區 */
    .drop-zone {
      border:2px dashed #cbd5e1; border-radius:10px; padding:36px 20px;
      text-align:center; cursor:pointer; transition:all 0.2s;
      background:#fafafa;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--eb-accent); background:#f0fdf4; }
    .drop-zone .icon { font-size:2.5rem; margin-bottom:10px; }
    .drop-zone p { font-size:0.9rem; color:#64748b; }
    .drop-zone strong { color:var(--eb-blue); }
    input[type="file"] { display:none; }

    /* 檔案列表 */
    .file-list { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
    .file-item {
      display:flex; align-items:center; gap:10px;
      background:#f8fafc; border-radius:8px; padding:10px 12px;
      border:1px solid #e2e8f0; cursor:grab;
    }
    .file-item.dragging { opacity:0.4; }
    .file-item.drag-over { border-color:var(--eb-accent); background:#f0fdf4; }
    .file-item .drag-handle { color:#94a3b8; font-size:1.1rem; cursor:grab; }
    .file-item .file-name { flex:1; font-size:0.88rem; color:#334155; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-item .file-size { font-size:0.78rem; color:#94a3b8; white-space:nowrap; }
    .file-item .del-btn { background:none; border:none; color:#ef4444; font-size:1rem; cursor:pointer; padding:2px 6px; border-radius:4px; }
    .file-item .del-btn:hover { background:#fee2e2; }
    .order-badge { font-size:0.75rem; font-weight:bold; background:var(--eb-blue); color:white; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* 按鈕 */
    .btn-row { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .btn { padding:11px 22px; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; transition:all 0.2s; }
    .btn-primary { background:var(--eb-blue); color:white; flex:1; }
    .btn-primary:hover { background:#254d7a; }
    .btn-primary:disabled { background:#94a3b8; cursor:not-allowed; }
    .btn-gray { background:#f1f5f9; color:#64748b; }
    .btn-gray:hover { background:#e2e8f0; }

    /* 進度 */
    .progress-wrap { margin-top:16px; display:none; }
    .progress-bar { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--eb-accent); border-radius:3px; transition:width 0.3s; width:0%; }
    .progress-text { font-size:12px; color:#64748b; margin-top:6px; text-align:center; }

    /* 結果 */
    .result-box { display:none; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:20px; text-align:center; margin-top:16px; }
    .result-box h3 { color:var(--eb-accent); margin-bottom:10px; }
    .btn-download { background:var(--eb-accent); color:white; padding:12px 28px; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-download:hover { background:#1d4731; }

    .tip { background:#fffbeb; border-left:3px solid var(--eb-gold); padding:10px 14px; border-radius:0 6px 6px 0; font-size:12px; color:#78350f; margin-top:12px; }

    footer { text-align:center; padding:40px 20px; color:#94a3b8; font-size:0.82rem; border-top:1px solid #e2e8f0; margin-top:20px; }
    footer a { color:#94a3b8; text-decoration:none; }
  </style>

<body>

<div class="hero">
  <h1>📑 PDF 合併</h1>
  <p>將多個 PDF 合併成一個 · 拖曳排序 · 檔案不上傳伺服器</p>
</div>

<div class="container">
  <div class="card">
    <h2>選擇 PDF 檔案</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📂</div>
      <p><strong>點擊選擇</strong>或拖曳 PDF 檔案到這裡</p>
      <p style="font-size:0.8rem;margin-top:6px;color:#94a3b8;">支援同時選擇多個檔案</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple>

    <div class="file-list" id="fileList"></div>

    <div class="tip">💡 拖曳列表中的項目可以調整合併順序</div>

    <div class="btn-row">
      <button class="btn btn-gray" onclick="clearAll()">🗑️ 清除全部</button>
      <button class="btn btn-primary" id="mergeBtn" onclick="mergePDFs()" disabled>📑 開始合併</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">處理中...</div>
    </div>

    <div class="result-box" id="resultBox">
      <h3>✅ 合併完成！</h3>
      <p id="resultInfo" style="font-size:13px;color:#475569;margin-bottom:14px;"></p>
      <a id="downloadLink" class="btn-download">⬇️ 下載合併後的 PDF</a>
    </div>
  </div>
</div>

<footer>

</footer>

<script>
const { PDFDocument } = PDFLib;
let files = [];
let dragSrcIndex = null;

// 拖曳上傳
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles([...e.dataTransfer.files]);
});

document.getElementById('fileInput').addEventListener('change', e => {
  addFiles([...e.target.files]);
  e.target.value = '';
});

function addFiles(newFiles) {
  newFiles.filter(f => f.type === 'application/pdf').forEach(f => files.push(f));
  renderList();
}

function formatSize(bytes) {
  if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function renderList() {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.draggable = true;
    item.dataset.index = i;
    item.innerHTML = `
      <span class="drag-handle">⠿</span>
      <span class="order-badge">${i+1}</span>
      <span class="file-name">${f.name}</span>
      <span class="file-size">${formatSize(f.size)}</span>
      <button class="del-btn" onclick="removeFile(${i})">✕</button>`;

    // 拖曳排序
    item.addEventListener('dragstart', () => { dragSrcIndex = i; item.classList.add('dragging'); });
    item.addEventListener('dragend',   () => item.classList.remove('dragging'));
    item.addEventListener('dragover',  e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.classList.remove('drag-over');
      if(dragSrcIndex !== null && dragSrcIndex !== i) {
        const moved = files.splice(dragSrcIndex, 1)[0];
        files.splice(i, 0, moved);
        dragSrcIndex = null;
        renderList();
      }
    });
    list.appendChild(item);
  });
  document.getElementById('mergeBtn').disabled = files.length < 2;
  document.getElementById('resultBox').style.display = 'none';
}

function removeFile(i) { files.splice(i,1); renderList(); }
function clearAll()    { files = []; renderList(); }

async function mergePDFs() {
  if(files.length < 2) return;
  const btn = document.getElementById('mergeBtn');
  const pw  = document.getElementById('progressWrap');
  const pf  = document.getElementById('progressFill');
  const pt  = document.getElementById('progressText');
  const rb  = document.getElementById('resultBox');

  btn.disabled = true;
  pw.style.display = 'block';
  rb.style.display = 'none';

  try {
    const merged = await PDFDocument.create();
    for(let i=0; i<files.length; i++) {
      pt.textContent = `正在處理第 ${i+1}/${files.length} 個檔案：${files[i].name}`;
      pf.style.width = ((i/files.length)*90) + '%';
      const buf  = await files[i].arrayBuffer();
      const src  = await PDFDocument.load(buf);
      const idxs = src.getPageIndices();
      const copied = await merged.copyPages(src, idxs);
      copied.forEach(p => merged.addPage(p));
    }

    pt.textContent = '正在產生 PDF...';
    pf.style.width = '95%';
    const bytes = await merged.save();
    pf.style.width = '100%';
    pt.textContent = '完成！';

    const blob = new Blob([bytes], { type:'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    link.href = url;
    link.download = `merged_${files.length}files.pdf`;

    const totalPages = (await PDFDocument.load(bytes)).getPageCount();
    document.getElementById('resultInfo').textContent =
      `共合併 ${files.length} 個檔案，總計 ${totalPages} 頁，檔案大小 ${formatSize(bytes.length)}`;

    rb.style.display = 'block';
  } catch(e) {
    pt.textContent = '❌ 處理失敗：' + e.message;
    pt.style.color = '#ef4444';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
