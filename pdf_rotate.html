  <style>
    :root { --eb-blue:#1a3a5f; --eb-accent:#2d6a4f; --eb-gold:#ff9f1c; }

    nav a:hover { color:#fff; }
    nav span { color:#fff; font-weight:bold; font-size:0.9rem; border-bottom:2px solid var(--eb-accent); padding-bottom:3px; }
    .hero { background:linear-gradient(135deg,var(--eb-blue),#0f2744); color:white; padding:36px 20px; text-align:center; }
    .hero h1 { font-size:1.6rem; margin-bottom:6px; }
    .hero p { font-size:0.88rem; opacity:0.8; }
    .container { max-width:760px; margin:30px auto; padding:0 15px; }
    .card { background:white; border-radius:14px; padding:28px; box-shadow:0 4px 15px rgba(0,0,0,0.06); margin-bottom:20px; }
    .card h2 { font-size:1rem; color:var(--eb-blue); margin-bottom:16px; border-left:4px solid var(--eb-accent); padding-left:10px; }
    .drop-zone { border:2px dashed #cbd5e1; border-radius:10px; padding:36px 20px; text-align:center; cursor:pointer; transition:all 0.2s; background:#fafafa; }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--eb-accent); background:#f0fdf4; }
    .drop-zone .icon { font-size:2.5rem; margin-bottom:10px; }
    .drop-zone p { font-size:0.9rem; color:#64748b; }
    input[type="file"] { display:none; }
    .file-info { display:none; margin-top:14px; padding:12px 16px; background:#f0fdf4; border-radius:8px; font-size:13px; color:#475569; border:1px solid #bbf7d0; }

    /* 旋轉設定 */
    .rotate-section { display:none; }
    .rotate-target { display:flex; gap:10px; margin:14px 0; flex-wrap:wrap; }
    .radio-btn { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .radio-btn input { accent-color:var(--eb-blue); }
    .radio-btn span { font-size:13px; color:#334155; }

    label { font-size:12px; font-weight:bold; color:var(--eb-blue); display:block; margin-bottom:6px; margin-top:14px; }

    .degree-btns { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
    .deg-btn { padding:10px 20px; border:2px solid #e2e8f0; border-radius:8px; background:white; color:#64748b; font-size:13px; font-weight:bold; cursor:pointer; transition:all 0.2s; }
    .deg-btn:hover { border-color:var(--eb-blue); color:var(--eb-blue); }
    .deg-btn.active { border-color:var(--eb-blue); background:var(--eb-blue); color:white; }

    input[type="text"], input[type="number"] { width:100%; padding:9px 12px; border:1px solid #cbd5e1; border-radius:6px; font-size:14px; outline:none; }
    input:focus { border-color:var(--eb-blue); }
    .hint { font-size:11px; color:#94a3b8; margin-top:4px; }

    .btn-row { display:flex; gap:10px; margin-top:20px; }
    .btn { padding:11px 22px; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; transition:all 0.2s; }
    .btn-primary { background:var(--eb-blue); color:white; flex:1; }
    .btn-primary:hover { background:#254d7a; }
    .btn-primary:disabled { background:#94a3b8; cursor:not-allowed; }
    .btn-gray { background:#f1f5f9; color:#64748b; }
    .progress-wrap { margin-top:16px; display:none; }
    .progress-bar { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--eb-accent); border-radius:3px; transition:width 0.3s; width:0%; }
    .progress-text { font-size:12px; color:#64748b; margin-top:6px; text-align:center; }
    .result-box { display:none; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:20px; text-align:center; margin-top:16px; }
    .result-box h3 { color:var(--eb-accent); margin-bottom:10px; }
    .btn-download { background:var(--eb-accent); color:white; padding:12px 28px; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; text-decoration:none; display:inline-block; }
    footer { text-align:center; padding:40px 20px; color:#94a3b8; font-size:0.82rem; border-top:1px solid #e2e8f0; margin-top:20px; }
    footer a { color:#94a3b8; text-decoration:none; }
  </style>
</head>
<body>

<nav style="background:#333; padding:12px 20px; text-align:left; width:100%; box-sizing:border-box;">

  <a href="./bowling.html" style="color:#bbb; text-decoration:none; font-size:0.9rem; margin-right:15px;">🎳 保齡球</a>
  <span style="color:#fff; font-weight:bold; font-size:0.9rem; border-bottom:2px solid #27ae60; padding-bottom:3px;">🔧 PDF 工具箱</span>
  <a href="./about.html" style="color:#bbb; text-decoration:none; font-size:0.9rem; margin-right:15px;">👤 關於我們</a>
  <a href="./articles.html" style="color:#bbb; text-decoration:none; font-size:0.9rem; margin-right:15px;">📚 知識專欄</a>

<div class="hero">
  <h1>🔄 PDF 旋轉</h1>
  <p>旋轉 PDF 頁面方向 · 支援指定頁面或全部旋轉 · 檔案不上傳伺服器</p>
</div>

<div class="container">
  <div class="card">
    <h2>上傳 PDF 檔案</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📂</div>
      <p><strong>點擊選擇</strong>或拖曳 PDF 到這裡</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf">
    <div class="file-info" id="fileInfo"></div>
  </div>

  <div class="card rotate-section" id="rotateCard">
    <h2>旋轉設定</h2>

    <label>旋轉目標</label>
    <div class="rotate-target">
      <label class="radio-btn"><input type="radio" name="target" value="all" checked><span>所有頁面</span></label>
      <label class="radio-btn"><input type="radio" name="target" value="specific"><span>指定頁碼</span></label>
    </div>

    <div id="specificPages" style="display:none;">
      <label>輸入頁碼</label>
      <input type="text" id="pageNums" placeholder="例：1,3,5-8,10">
      <div class="hint">支援單頁（1,3）或範圍（5-8），以逗號分隔</div>
    </div>

    <label>旋轉角度</label>
    <div class="degree-btns">
      <button class="deg-btn" onclick="setDeg(90)">↻ 90°</button>
      <button class="deg-btn active" onclick="setDeg(180)">↻ 180°</button>
      <button class="deg-btn" onclick="setDeg(270)">↺ 90°（逆時針）</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-gray" onclick="reset()">重新選擇</button>
      <button class="btn btn-primary" id="rotateBtn" onclick="rotatePDF()">🔄 開始旋轉</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">處理中...</div>
    </div>

    <div class="result-box" id="resultBox">
      <h3>✅ 旋轉完成！</h3>
      <a id="downloadLink" class="btn-download">⬇️ 下載旋轉後的 PDF</a>
    </div>
  </div>
</div>

<footer>
  © 2026 銳青科技整合有限公司 |
  <a href="./pdf_tools.html">← PDF 工具箱</a> |
  <a href="./privacy.html">隱私權政策</a> |
  <a href="./terms.html">服務條款</a>
</footer>

<script>
const { PDFDocument, degrees } = PDFLib;
let pdfFile = null;
let totalPages = 0;
let selectedDeg = 180;

document.querySelector('input[name="target"]') && document.querySelectorAll('input[name="target"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('specificPages').style.display = r.value==='specific'?'block':'none';
  });
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => { loadFile(e.target.files[0]); e.target.value=''; });

async function loadFile(file) {
  if(!file || file.type!=='application/pdf') return;
  pdfFile = file;
  const buf = await file.arrayBuffer();
  const pdf = await PDFDocument.load(buf);
  totalPages = pdf.getPageCount();
  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('fileInfo').textContent = `✅ ${file.name}  |  共 ${totalPages} 頁`;
  document.getElementById('rotateCard').style.display = 'block';
}

function setDeg(d) {
  selectedDeg = d;
  document.querySelectorAll('.deg-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function parsePages(str) {
  const pages = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    if(part.includes('-')) {
      const [a,b] = part.split('-').map(Number);
      for(let i=a;i<=b;i++) pages.add(i-1);
    } else if(part) {
      pages.add(Number(part)-1);
    }
  });
  return [...pages].filter(p => p>=0 && p<totalPages);
}

function reset() { pdfFile=null; document.getElementById('rotateCard').style.display='none'; document.getElementById('fileInfo').style.display='none'; }

async function rotatePDF() {
  if(!pdfFile) return;
  const btn = document.getElementById('rotateBtn');
  const pw  = document.getElementById('progressWrap');
  const pf  = document.getElementById('progressFill');
  const pt  = document.getElementById('progressText');
  const rb  = document.getElementById('resultBox');

  btn.disabled=true; pw.style.display='block'; rb.style.display='none';
  pf.style.width='0%'; pt.textContent='處理中...';

  try {
    const buf = await pdfFile.arrayBuffer();
    const pdf = await PDFDocument.load(buf);
    const target = document.querySelector('input[name="target"]:checked').value;
    let pagesToRotate;
    if(target==='all') {
      pagesToRotate = Array.from({length:totalPages},(_,i)=>i);
    } else {
      pagesToRotate = parsePages(document.getElementById('pageNums').value);
    }

    pagesToRotate.forEach(i => {
      const page = pdf.getPage(i);
      const cur  = page.getRotation().angle;
      page.setRotation(degrees((cur + selectedDeg) % 360));
    });

    pf.style.width='80%'; pt.textContent='產生 PDF...';
    const bytes = await pdf.save();
    pf.style.width='100%'; pt.textContent='完成！';

    const blob = new Blob([bytes],{type:'application/pdf'});
    const url  = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    link.href = url;
    link.download = pdfFile.name.replace('.pdf','') + '_rotated.pdf';
    rb.style.display='block';
  } catch(e) {
    pt.textContent='❌ 失敗：'+e.message; pt.style.color='#ef4444';
  } finally { btn.disabled=false; }
}
</script>
</body>
</html>
